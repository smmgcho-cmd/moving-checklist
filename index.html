<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>이사 체크리스트 📦 행당대림→대림코오롱 4/9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2;
    --card: #FFFFFF;
    --text: #2C2C2C;
    --text-sub: #7A7A7A;
    --accent: #FF6B35;
    --accent-soft: #FFF0E8;
    --blue: #3B82F6;
    --blue-soft: #EFF6FF;
    --green: #22C55E;
    --green-soft: #F0FDF4;
    --red: #EF4444;
    --red-soft: #FEF2F2;
    --purple: #8B5CF6;
    --purple-soft: #F5F3FF;
    --border: #E8E4DE;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: 100px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #FF6B35 0%, #FF8F5E 50%, #FFB088 100%);
    padding: 52px 24px 32px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30%;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
  }
  .header-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .header-date {
    font-size: 15px;
    font-weight: 400;
    opacity: 0.9;
  }
  .header-dday {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(4px);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    margin-top: 12px;
  }

  /* Progress bar */
  .progress-wrap {
    padding: 20px 20px 8px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
  }
  .progress-count {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B35, #FF8F5E);
    border-radius: 8px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Sections */
  .section {
    margin: 16px 16px 0;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: slideUp 0.4s ease-out both;
  }
  .section:nth-child(2) { animation-delay: 0.05s; }
  .section:nth-child(3) { animation-delay: 0.1s; }
  .section:nth-child(4) { animation-delay: 0.15s; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    position: relative;
  }
  .section-header:active {
    background: rgba(0,0,0,0.02);
  }
  .section-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    margin-right: 14px;
  }
  .section-title-wrap {
    flex: 1;
    min-width: 0;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
  }
  .section-subtitle {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 2px;
  }
  .section-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .chevron {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    color: var(--text-sub);
  }
  .section.open .chevron {
    transform: rotate(180deg);
  }

  .section-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .section.open .section-body {
    max-height: 2000px;
  }
  .section-content {
    padding: 0 20px 20px;
  }

  /* Check items */
  .check-item {
    display: flex;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid #F5F3EF;
    gap: 12px;
  }
  .check-item:last-child {
    border-bottom: none;
  }
  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .checkbox.checked::after {
    content: '';
    width: 7px;
    height: 12px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
    margin-top: -3px;
  }
  .check-item.done .item-text {
    text-decoration: line-through;
    color: var(--text-sub);
  }
  .item-content { flex: 1; min-width: 0; }
  .item-date {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    background: var(--blue-soft);
    padding: 2px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 4px;
  }
  .item-date.important {
    color: var(--red);
    background: var(--red-soft);
  }
  .item-text {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text);
    transition: all 0.25s;
  }
  .item-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    background: var(--red);
    color: white;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Timeline */
  .timeline-group-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 12px 0 8px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .timeline-group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .timeline-item {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    position: relative;
    cursor: pointer;
  }
  .timeline-item:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 38px;
    bottom: -2px;
    width: 2px;
    background: var(--border);
  }
  .timeline-time {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: white;
    position: relative;
    z-index: 1;
  }
  .timeline-time.morning { background: var(--blue); }
  .timeline-time.afternoon { background: var(--accent); }
  .timeline-detail { flex: 1; min-width: 0; padding-top: 4px; }
  .timeline-hour {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .timeline-desc {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.5;
  }
  .timeline-desc .must {
    color: var(--red);
    font-weight: 700;
  }
  .timeline-item .checkbox {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    position: relative;
    z-index: 1;
  }
  .timeline-item .checkbox.checked::after {
    width: 8px;
    height: 13px;
  }
  .timeline-item.done .timeline-hour,
  .timeline-item.done .timeline-desc {
    text-decoration: line-through;
    color: #C0C0C0;
  }

  /* Warning cards */
  .warning-card {
    background: var(--red-soft);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 4px solid var(--red);
  }
  .warning-card:last-child { margin-bottom: 0; }
  .warning-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 4px;
  }
  .warning-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  /* Floating share button */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    z-index: 100;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:active {
    transform: scale(0.92);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Reset button */
  .reset-wrap {
    text-align: center;
    padding: 24px 16px 16px;
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-sub);
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">MOVING CHECKLIST</div>
  <h1>📦 행당대림 → 대림코오롱<br>이사 완벽 체크리스트</h1>
  <div class="header-date">2026년 4월 9일 (목) · 이사 당일</div>
  <div class="header-dday" id="ddayBadge"></div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span class="progress-label">전체 진행률</span>
    <span class="progress-count" id="progressText">0 / 0</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div id="app"></div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">✓ 체크 초기화</button>
</div>

<button class="fab" onclick="shareChecklist()" aria-label="공유">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
</button>

<div class="toast" id="toast"></div>

<script>
const DATA = [
  {
    id: 'before',
    icon: '🗓️',
    color: '#3B82F6',
    colorSoft: '#EFF6FF',
    title: '이사 전 준비',
    subtitle: 'D-Day 전 필수 체크',
    items: [
      { date: '3/26(목)', text: '업체 최종 확정 (허가업체 여부 재확인)' },
      { date: '4/2(목)', text: '주소 이전 신청 (KT무빙, 우체국 주거이전)' },
      { date: '4/6(월)', text: '은행 이체 한도 증액 (최소 1억 이상)', important: true },
      { date: '4/6(월)', text: '도시가스 전출/전입 방문 예약' },
      { date: '4/8(수)', text: '귀중품(G80 차량 이동), 세면도구, 충전기 따로 챙기기' },
      { date: '4/8(수)', text: '75L 쓰레기 봉투 1~2개 미리 구입' },
    ]
  },
  {
    id: 'morning',
    icon: '☀️',
    color: '#3B82F6',
    colorSoft: '#EFF6FF',
    title: '오전 · 기존 집',
    subtitle: '08:00 ~ 11:00',
    timeline: true,
    items: [
      { time: '08:00', text: '이사 팀 도착 및 작업 시작', desc: '현장에서 대기하며 작업 감독' },
      { time: '09:30', text: '계량기 사진 촬영', desc: '가스/전기/수도 → 고객센터 정산' },
      { time: '10:30', text: '관리실 방문', desc: '엘리베이터 사용료 납부, 장기수선충당금 환급' },
      { time: '11:00', text: '이삿짐 반출 확인', desc: '최종 청소 상태 점검' },
    ]
  },
  {
    id: 'afternoon',
    icon: '🏠',
    color: '#FF6B35',
    colorSoft: '#FFF0E8',
    title: '오후 · 새 집',
    subtitle: '12:30 ~ 18:00',
    timeline: true,
    items: [
      { time: '12:30', text: '잔금 송금 & 중개수수료 결제', desc: '부동산 중개사무소' },
      { time: '13:30', text: '전입신고 & 확정일자 완료', desc: '정부24 앱 (필수!)', must: true },
      { time: '14:00', text: '가구/가전 배치 감독', desc: '냉장고 수평 확인 필수' },
      { time: '16:00', text: '인터넷/TV 설치 기사 방문', desc: 'KT 이전 설치 확인' },
      { time: '17:30', text: '파손/스크래치 검수', desc: '가구 확인 후 이사비용 결제' },
      { time: '18:00', text: '도어락 비밀번호 변경', desc: '마스터키 수령 확인' },
    ]
  },
  {
    id: 'warning',
    icon: '⚠️',
    color: '#EF4444',
    colorSoft: '#FEF2F2',
    title: '당일 3대 주의사항',
    subtitle: '반드시 숙지하세요',
    warnings: [
      { title: '💰 현금/귀금속', desc: '절대 이삿짐 트럭에 넣지 말고 G80 조수석에 직접 보관하세요.' },
      { title: '🔍 파손 확인', desc: '이사 팀 가기 전에 큰 가구 문 열어보고 가전 전원 켜보세요.' },
      { title: '🏦 이체 오류', desc: 'OTP 카드나 보안카드가 잘 작동하는지 4/8에 미리 테스트하세요.' },
    ]
  }
];

let checked = {};
try {
  checked = JSON.parse(localStorage.getItem('moving_checked') || '{}');
} catch(e) {}

function save() {
  try { localStorage.setItem('moving_checked', JSON.stringify(checked)); } catch(e) {}
}

function getTotal() {
  let total = 0;
  DATA.forEach(s => { if (s.items) total += s.items.length; });
  return total;
}

function getCheckedCount() {
  return Object.values(checked).filter(Boolean).length;
}

function updateProgress() {
  const total = getTotal();
  const done = getCheckedCount();
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = (total ? (done/total*100) : 0) + '%';
}

function toggleCheck(key) {
  checked[key] = !checked[key];
  save();
  render();
}

function toggleSection(id) {
  const el = document.querySelector(`[data-section="${id}"]`);
  if (el) el.classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function shareChecklist() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: '이사 체크리스트 📦 행당대림→대림코오롱', text: '4/9 이사용 완벽 체크리스트', url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('링크가 복사되었습니다! 📋'));
  } else {
    showToast('브라우저에서 공유를 지원하지 않습니다');
  }
}

function resetAll() {
  if (confirm('모든 체크를 초기화할까요?')) {
    checked = {};
    save();
    render();
    showToast('초기화 완료! ✨');
  }
}

function chevronSVG() {
  return `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
}

function render() {
  const app = document.getElementById('app');
  let html = '';

  DATA.forEach(section => {
    const isWarning = !!section.warnings;
    const badgeCount = section.items ? section.items.filter((_,i) => checked[section.id+'_'+i]).length : 0;
    const badgeTotal = section.items ? section.items.length : 0;

    html += `<div class="section open" data-section="${section.id}">`;
    html += `<div class="section-header" onclick="toggleSection('${section.id}')">`;
    html += `<div class="section-icon" style="background:${section.colorSoft}">${section.icon}</div>`;
    html += `<div class="section-title-wrap"><div class="section-title">${section.title}</div><div class="section-subtitle">${section.subtitle}</div></div>`;
    if (!isWarning) {
      html += `<span class="section-badge" style="background:${badgeCount===badgeTotal && badgeTotal>0 ? '#DCFCE7;color:#16A34A' : section.colorSoft+';color:'+section.color}">${badgeCount}/${badgeTotal}</span>`;
    }
    html += chevronSVG();
    html += `</div>`;

    html += `<div class="section-body"><div class="section-content">`;

    if (isWarning) {
      section.warnings.forEach(w => {
        html += `<div class="warning-card"><div class="warning-title">${w.title}</div><div class="warning-desc">${w.desc}</div></div>`;
      });
    } else if (section.timeline) {
      section.items.forEach((item, i) => {
        const key = section.id + '_' + i;
        const done = checked[key];
        const period = section.id === 'morning' ? 'morning' : 'afternoon';
        html += `<div class="timeline-item ${done?'done':''}" onclick="toggleCheck('${key}')">`;
        html += `<div class="checkbox ${done?'checked':''}"></div>`;
        html += `<div class="timeline-detail">`;
        html += `<div class="timeline-hour">${item.time} ${item.text}${item.must?'<span class="item-tag">필수</span>':''}</div>`;
        html += `<div class="timeline-desc">${item.desc}</div>`;
        html += `</div></div>`;
      });
    } else {
      section.items.forEach((item, i) => {
        const key = section.id + '_' + i;
        const done = checked[key];
        html += `<div class="check-item ${done?'done':''}" onclick="toggleCheck('${key}')">`;
        html += `<div class="checkbox ${done?'checked':''}"></div>`;
        html += `<div class="item-content">`;
        if (item.date) html += `<div class="item-date ${item.important?'important':''}">${item.date}</div>`;
        html += `<div class="item-text">${item.text}${item.important?'<span class="item-tag">중요</span>':''}</div>`;
        html += `</div></div>`;
      });
    }

    html += `</div></div></div>`;
  });

  app.innerHTML = html;
  updateProgress();
}

// D-Day calc
function updateDday() {
  const target = new Date('2026-04-09T00:00:00+09:00');
  const now = new Date();
  const diff = Math.ceil((target - now) / (1000*60*60*24));
  const badge = document.getElementById('ddayBadge');
  if (diff > 0) badge.textContent = `D-${diff}`;
  else if (diff === 0) badge.textContent = 'D-DAY 🎉';
  else badge.textContent = `D+${Math.abs(diff)}`;
}

updateDday();
render();
</script>
</body>
</html>
